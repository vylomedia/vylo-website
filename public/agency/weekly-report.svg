or="end">Week 46 - Nov 11-17</text></g><line x1="28" y1="50" x2="352" y2="50" stroke="#ececec" stroke-width="1"/><text x="28" y="78" fill="#1e1d1b" font-size="14" font-weight="700">Weekly Performance Report</text><text x="28" y="94" fill="#5a5a5a" font-size="10">Acme Skincare - Prepared by Pranjul</text><g transform="translate(28, 110)"><rect width="100" height="62" rx="4" fill="#f7f7f8" stroke="#ececec" stroke-width="1"/><text x="10" y="18" fill="#a7a6a6" font-size="9" font-weight="600" letter-spacing="0.5">CAC</text><text x="10" y="40" fill="#1e1d1b" font-size="16" font-weight="700">$57.60</text><g transform="translate(10, 46)"><rect width="48" height="14" rx="3" fill="#DCFCE7"/><text x="24" y="11" fill="#16A34A" font-size="9" font-weight="700" text-anchor="middle">-17%</text></g><rect x="110" width="100" height="62" rx="4" fill="#f7f7f8" stroke="#ececec" stroke-width="1"/><text x="120" y="18" fill="#a7a6a6" font-size="9" font-weight="600" letter-spacing="0.5">ROAS</text><text x="120" y="40" fill="#1e1d1b" font-size="16" font-weight="700">1.64x</text><g transform="translate(120, 46)"><rect width="48" height="14" rx="3" fill="#DCFCE7"/><text x="24" y="11" fill="#16A34A" font-size="9" font-weight="700" text-anchor="middle">+24%</text></g><rect x="220" width="100" height="62" rx="4" fill="#f7f7f8" stroke="#ececec" stroke-width="1"/><text x="230" y="18" fill="#a7a6a6" font-size="9" font-weight="600" letter-spacing="0.5">CONVERSIONS</text><text x="230" y="40" fill="#1e1d1b" font-size="16" font-weight="700">149</text><g transform="translate(230, 46)"><rect width="48" height="14" rx="3" fill="#DCFCE7"/><text x="24" y="11" fill="#16A34A" font-size="9" font-weight="700" text-anchor="middle">+18%</text></g></g><text x="28" y="198" fill="#1e1d1b" font-size="11" font-weight="700">What changed this week</text><g transform="translate(28, 208)" fill="#1e1d1b" font-size="10" font-family="Georgia, serif"><text y="14">Strong week - CAC dropped meaningfully off the back of the</text><text y="28">UGC variant we launched Tuesday. Founder-POV format beat</text><text y="42">the control 2.4x. Scaling 30% on Monday. Search held steady;</text><text y="56">brand defense bid is paying off - branded CPC down 8%.</text></g><line x1="28" y1="274" x2="352" y2="274" stroke="#ececec" stroke-width="1"/><g transform="translate(28, 290)"><text fill="#1e1d1b" font-size="10" font-weight="700">Next week -&gt;</text><text x="80" fill="#5a5a5a" font-size="10">Brief 3 new founder-POV variants, kill ad set #4</text></g></g><g transform="translate(630, 180)" filter="url(#softShadow5)"><rect width="150" height="78" rx="10" fill="#ffffff" stroke="#ececec" stroke-width="1"/><rect x="10" y="10" width="20" height="20" rx="5" fill="#1e1d1b"/><text x="20" y="24" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle">#</text><text x="36" y="20" fill="#1e1d1b" font-size="10" font-weight="700">Slack</text><text x="36" y="32" fill="#a7a6a6" font-size="8">9:02 AM - Monday</text><line x1="10" y1="42" x2="140" y2="42" stroke="#ececec" stroke-width="1"/><text x="10" y="56" fill="#1e1d1b" font-size="9" font-weight="600">Your weekly report</text><text x="10" y="68" fill="#1e1d1b" font-size="9" font-weight="600">is ready</text><text x="100" y="68" fill="#5c5fff" font-size="11" font-weight="700">-&gt;</text></g><g transform="translate(630, 282)" filter="url(#softShadow5)"><rect width="150" height="68" rx="10" fill="#ffffff" stroke="#ececec" stroke-width="1"/><rect x="10" y="10" width="20" height="20" rx="5" fill="#e2e2ff"/><text x="20" y="25" fill="#4548e6" font-size="12" font-weight="700" text-anchor="middle">&#10003;</text><text x="36" y="20" fill="#1e1d1b" font-size="10" font-weight="700">Verified by me</text><text x="36" y="32" fill="#a7a6a6" font-size="8">Every number, every line</text><line x1="10" y1="42" x2="140" y2="42" stroke="#ececec" stroke-width="1"/><text x="10" y="58" fill="#4548e6" font-size="9" font-weight="600">AI drafts. I sign off.</text></g></svg>
